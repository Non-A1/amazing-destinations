<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ground Level | Dynamic Global Portfolio</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet.js Interactive Map Assets -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: system-ui, -apple-system, sans-serif; }
        .accent-glow { text-shadow: 0 0 12px rgba(59, 130, 246, 0.5); }
        
        /* Dark Theme adjustment overlay for OpenStreetMap layer */
        .dark-map .leaflet-tile-container {
            filter: invert(100%) hue-rotate(180deg) brightness(85%) contrast(90%);
        }
        .leaflet-container { background: #0d1321; }
        
        /* Smooth transformation vector for stickman map movement */
        .animated-stickman {
            transition: transform 2.2s cubic-bezier(0.25, 1, 0.5, 1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <!-- Header / Navigation -->
    <header class="border-b border-gray-800 bg-gray-950/80 backdrop-blur sticky top-0 z-50 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-mono tracking-widest text-blue-500 font-bold accent-glow">THE GROUND LEVEL</h1>
            <div class="flex items-center space-x-3 bg-gray-900 px-4 py-2 rounded-lg border border-gray-800">
                <span class="text-xs font-mono text-gray-400">GUIDE BRIEFING:</span>
                <audio id="intro-audio" src="media/audio/intro.mp3" controls class="h-8 max-w-[200px] sm:max-w-xs invert opacity-80"></audio>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-6 py-12 flex-grow w-full space-y-8">
        
        <section class="text-center max-w-3xl mx-auto">
            <h2 class="text-4xl sm:text-5xl font-black tracking-tight mb-4 text-white">Interactive Curation <span class="text-blue-500">Console</span></h2>
            <p class="text-gray-400 text-sm sm:text-base">Click any destination node directly embedded in the live global tracking grid below to deploy data packets.</p>
        </section>

        <!-- Dynamic Leaflet Map Element Window -->
        <section class="bg-gray-950 border border-gray-800 rounded-2xl p-3 shadow-2xl relative">
            <div class="absolute top-6 left-6 bg-gray-950/90 border border-gray-800 rounded-lg px-4 py-2 z-[1000] font-mono text-xs shadow-xl backdrop-blur">
                <span class="text-gray-500">BASE STATION:</span> <span class="text-blue-400 font-bold">Irvine, CA</span><br>
                <span class="text-gray-500">RANGE VALUE:</span> <span id="distance-readout" class="text-emerald-400 font-bold">0 miles</span>
            </div>
            <!-- Actual Map Frame Container -->
            <div id="map" class="w-full h-[380px] sm:h-[450px] rounded-xl border border-gray-900 dark-map"></div>
        </section>

        <!-- Media Display Unit -->
        <section class="max-w-4xl mx-auto w-full">
            <div id="display-panel" class="bg-gray-950 border border-gray-800 rounded-2xl p-6 sm:p-8 shadow-2xl relative overflow-hidden hidden">
                <!-- Data sets append here dynamically upon stickman terminal arrival -->
            </div>
        </section>
    </main>

    <footer class="border-t border-gray-900 bg-gray-950/50 py-6 text-center text-xs font-mono text-gray-600">
        &copy; 2026 THE GROUND LEVEL. MAP-INTEGRATED EXPEDITION MATRIX.
    </footer>

    <script>
        // Precision Coordinates Mapping Latitudes & Longitudes
        const originCoords = [33.6846, -117.8265]; // Irvine, California
        
        const destinations = {
            bangkok: {
                title: "Bangkok, Thailand",
                coords: [13.7563, 100.5018], distance: "8,255 miles",
                text: "The high-velocity heart of Southeast Asia. Bangkok challenges your senses with its complex maze of street food networks, ancient golden temple architecture, and chaotic modern energy.",
                photos: ["media/photos/bangkok1.jpg", "media/photos/bangkok2.jpg", "media/photos/bangkok3.jpg", "media/photos/bangkok4.jpg", "media/photos/bangkok5.jpg", "media/photos/bangkok6.jpg"],
                audio: "media/audio/bangkok-intro.mp3"
            },
            krabi: {
                title: "Krabi, Thailand",
                coords: [8.0584, 98.9169], distance: "8,242 miles",
                text: "Rugged limestone formations dropping directly into crystal coastal waters. An absolute paradise for off-the-grid adventure and deep culinary discoveries.",
                photos: ["media/photos/krabi1.jpg", "media/photos/krabi2.jpg", "media/photos/krabi3.jpg", "media/photos/krabi4.jpg", "media/photos/krabi5.jpg"],
                audio: "media/audio/krabi-intro.mp3"
            },
            berlin: {
                title: "Berlin, Germany",
                coords: [52.5200, 13.4050], distance: "5,793 miles",
                text: "A grand historical grid combined with unmatched creative subcultures. Berlin is raw, deep, and constantly reinventing its architecture and structural landscape.",
                photos: ["media/photos/berlin1.jpg", "media/photos/berlin2.jpg", "media/photos/berlin3.jpg", "media/photos/berlin4.jpg", "media/photos/berlin5.jpg"],
                audio: "media/audio/berlin-intro.mp3"
            },
            hamburg: {
                title: "Hamburg, Germany",
                coords: [53.5511, 9.9937], distance: "5,627 miles",
                text: "A legendary maritime hub defined by architectural grit and immense water networks. We will navigate the historic, red-brick warehouse district and experience Europe's largest active ports.",
                photos: ["media/photos/hamburg1.jpg", "media/photos/hamburg2.jpg", "media/photos/hamburg3.jpg", "media/photos/hamburg4.jpg"],
                audio: "media/audio/hamburg-intro.mp3"
            },
            dortmund: {
                title: "Dortmund, Germany",
                coords: [51.5136, 7.4653], distance: "5,690 miles",
                text: "Industrial heritage masterfully repurposed into digital and cultural innovation spaces. Famous for its intense sports culture and sprawling green spaces.",
                photos: ["media/photos/dortmund1.jpg", "media/photos/dortmund2.jpg", "media/photos/dortmund3.jpg", "media/photos/dortmund4.jpg", "media/photos/dortmund5.jpg", "media/photos/dortmund6.jpg"],
                audio: "media/audio/dortmund-intro.mp3"
            },
            amsterdam: {
                title: "Amsterdam, The Netherlands",
                coords: [52.3676, 4.9041], distance: "5,655 miles",
                text: "A masterclass in historical urban planning. A completely interconnected grid of historic canal paths, artistic hubs, and exceptional biking mobility.",
                photos: ["media/photos/amsterdam1.jpg", "media/photos/amsterdam2.jpg", "media/photos/amsterdam3.jpg", "media/photos/amsterdam4.jpg"],
                audio: "media/audio/amsterdam-intro.mp3"
            },
            haarlem: {
                title: "Haarlem, The Netherlands",
                coords: [52.3874, 4.6462], distance: "5,645 miles",
                text: "Classic Dutch architectural history preserved in an unhurried, local pace. Exceptional cobblestone market centers just minutes away from the busy capital core.",
                photos: ["media/photos/haarlem1.jpg", "media/photos/haarlem2.jpg", "media/photos/haarlem3.jpg", "media/photos/haarlem4.jpg"],
                audio: "media/audio/haarlem-intro.mp3"
            },
            seoul: {
                title: "Seoul, South Korea",
                coords: [37.5665, 126.9780], distance: "5,974 miles",
                text: "Hyper-efficient mass transit, neon cyberpunk alleyways, and imperial palaces coexisting in perfect harmony. The absolute definition of a high-tech metropolis.",
                photos: ["media/photos/seoul1.jpg", "media/photos/seoul2.jpg", "media/photos/seoul3.jpg", "media/photos/seoul4.jpg", "media/photos/seoul5.jpg", "media/photos/seoul6.jpg"],
                audio: "media/audio/seoul-intro.mp3"
            }
        };

        // Initialize Map Object
        const map = L.map('map', { center: [30, -30], zoom: 2, minZoom: 2 });
        
        // Add OpenStreetMap Realistic Street/Terrain Tile sets
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Define Customized Stickman Vector Icon Graphic
        const stickmanSvg = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -30 30 40" width="30" height="40" class="animated-stickman">
                <rect x="-10" y="-22" width="6" height="12" rx="2" fill="#ef4444" />
                <circle cx="0" cy="-25" r="4" fill="#3b82f6" stroke="#ffffff" stroke-width="1"/>
                <line x1="0" y1="-21" x2="0" y2="-10" stroke="#ffffff" stroke-width="2" />
                <line x1="-5" y1="-18" x2="5" y2="-18" stroke="#ffffff" stroke-width="2" />
                <line x1="0" y1="-10" x2="-4" y2="0" stroke="#ffffff" stroke-width="2" />
                <line x1="0" y1="-10" x2="4" y2="0" stroke="#ffffff" stroke-width="2" />
            </svg>`;
        
        const stickmanIcon = L.divIcon({
            html: stickmanSvg,
            className: 'custom-stickman-marker',
            iconSize: [30, 40],
            iconAnchor: [15, 10]
        });

        // Initialize Base Coordinates Markers
        L.marker(originCoords, {
            icon: L.divIcon({ html: '<div class="w-3 h-3 bg-blue-500 rounded-full border-2 border-white animate-pulse"></div>', className: '' })
        }).addTo(map);

        const stickmanMarker = L.marker(originCoords, { icon: stickmanIcon, zIndexOffset: 1000 }).addTo(map);
        
        let currentFlightLine = null;
        let slideInterval = null;

        // Populate Destination Target Pins Onto Map Layout
        Object.keys(destinations).forEach(key => {
            const dest = destinations[key];
            const marker = L.marker(dest.coords, {
                icon: L.divIcon({ html: '<div class="w-4 h-4 bg-emerald-500 rounded-full border-2 border-gray-950 hover:scale-125 transition-transform cursor-pointer"></div>', className: '' })
            }).addTo(map);
            
            marker.on('click', () => triggerTrek(key));
        });

        // Core Animation and Sequence Controller Routing Logic
        function triggerTrek(key) {
            clearInterval(slideInterval);
            const data = destinations[key];
            
            document.getElementById('distance-readout').innerText = data.distance;

            // Remove existing flight polyline vectors
            if (currentFlightLine) map.removeLayer(currentFlightLine);

            // Draw real geodesic tracking path line
            currentFlightLine = L.polyline([originCoords, data.coords], {
                color: '#3b82f6', weight: 2, dashArray: '6, 8', opacity: 0.7
            }).addTo(map);

            // Pan camera bounds smoothly to clear path view frame
            map.fitBounds([originCoords, data.coords], { padding: [50, 50], maxZoom: 4 });

            // Physically animate stickman marker properties across geographic spaces
            setTimeout(() => {
                stickmanMarker.setLatLng(data.coords);
                
                // Track complete transit sequence, then initialize dynamic media deployment
                setTimeout(() => {
                    deployMediaDashboard(data);
                }, 2200); // Set to execute precisely upon transit termination vector
            }, 300);
        }

        function deployMediaDashboard(data) {
            const panel = document.getElementById('display-panel');
            panel.classList.remove('hidden');
            
            let photoSlides = data.photos.map((img, i) => 
                `<img src="${img}" id="slide-${i}" class="slide-img w-full h-64 sm:h-80 object-cover rounded-xl border border-gray-800 absolute top-0 left-0 transition-opacity duration-1000 ${i === 0 ? 'opacity-100' : 'opacity-0'}" alt="Slide ${i}">`
            ).join('');

            panel.innerHTML = `
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-gray-900 pb-4 mb-4 gap-2">
                    <h3 class="text-2xl font-bold text-white tracking-tight">${data.title}</h3>
                    <span class="text-xs font-mono bg-gray-900 text-gray-400 border border-gray-800 px-3 py-1 rounded-full">${data.distance} from HQ</span>
                </div>
                
                <div class="relative w-full h-64 sm:h-80 mb-6 overflow-hidden rounded-xl bg-gray-900 shadow-inner">
                    ${photoSlides}
                </div>

                <div class="mb-6 p-4 bg-gray-900 rounded-xl border border-blue-950/50 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 shadow-md">
                    <div>
                        <p class="text-xs font-mono text-blue-400 font-bold uppercase tracking-wider">🎙️ AUDIO BRIEFING DEPLOYED</p>
                        <p class="text-xs text-gray-500 mt-0.5">Playing on-the-ground briefing for this terminal position.</p>
                    </div>
                    <audio id="destination-audio" src="${data.audio}" controls autoplay class="h-8 w-full sm:max-w-xs invert opacity-90"></audio>
                </div>

                <p class="text-gray-300 leading-relaxed text-sm sm:text-base">${data.text}</p>
            `;

            // Scroll user view down cleanly to the populated content panel automatically
            panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            // Fire slideshow automation loop
            let currentSlide = 0;
            const totalSlides = data.photos.length;
            if (totalSlides > 1) {
                slideInterval = setInterval(() => {
                    const activeImg = document.getElementById(`slide-${currentSlide}`);
                    if (activeImg) activeImg.classList.replace('opacity-100', 'opacity-0');
                    
                    currentSlide = (currentSlide + 1) % totalSlides;
                    
                    const nextImg = document.getElementById(`slide-${currentSlide}`);
                    if (nextImg) nextImg.classList.replace('opacity-0', 'opacity-100');
                }, 3500);
            }
        }
    </script>
</body>
</html>
