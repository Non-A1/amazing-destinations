<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazing Destinations | Interactive Grid</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }
        .accent-glow { text-shadow: 0 0 15px rgba(59, 130, 246, 0.6); }
        
        /* Dark map inversion rules for an immersive tech-aesthetic */
        .dark-map .leaflet-tile-container {
            filter: invert(100%) hue-rotate(180deg) brightness(85%) contrast(90%);
        }
        .leaflet-container { background: #0d1321; }
        
        /* Smooth transitions for moving map icons */
        .animated-vehicle {
            transition: transform 2.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col justify-between overflow-hidden">

    <div id="intro-overlay" class="fixed inset-0 bg-[#070a12] z-[9999] flex flex-col items-center justify-center p-6 text-center transition-opacity duration-1000">
        <div class="max-w-2xl space-y-6">
            <h1 class="text-xs font-mono tracking-widest text-blue-500 uppercase font-bold accent-glow">THE GROUND LEVEL</h1>
            <h2 class="text-3xl sm:text-5xl font-black tracking-tight text-white leading-tight">
                Amazing Destinations - <br><span class="text-blue-500">Places that brought me joy and excitement</span>
            </h2>
            <button onclick="launchWebsite()" class="mt-4 px-8 py-4 bg-blue-600 hover:bg-blue-500 text-white font-mono text-sm tracking-wider font-bold rounded-xl shadow-lg shadow-blue-600/20 active:scale-95 transition-all">
                ENTER EXPEDITION GRID
            </button>
        </div>
    </div>

    <header class="border-b border-gray-800 bg-gray-950/80 backdrop-blur z-50 px-6 py-3 flex-none">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-lg font-mono tracking-widest text-blue-500 font-bold accent-glow">THE GROUND LEVEL</h1>
                <p class="text-[10px] font-mono text-gray-500 uppercase">Origin Station: Irvine, CA</p>
            </div>
            <div class="flex items-center space-x-3 bg-gray-900 px-3 py-1.5 rounded-lg border border-gray-800">
                <span class="text-[10px] font-mono text-gray-400">GUIDE BRIEFING:</span>
                <audio id="intro-audio" src="media/audio/intro.mp3" controls class="h-6 max-w-[150px] sm:max-w-xs invert opacity-80"></audio>
            </div>
        </div>
    </header>

    <main class="flex-grow w-full relative">
        <div class="absolute top-4 left-4 bg-gray-950/90 border border-gray-800 rounded-lg px-4 py-2 z-[1000] font-mono text-xs shadow-xl backdrop-blur">
            <span class="text-gray-500">FLIGHT VECTOR DISTANCE:</span> <span id="distance-readout" class="text-emerald-400 font-bold">0 miles</span>
        </div>

        <div id="map" class="w-full h-full dark-map"></div>

        <div id="media-modal" class="fixed inset-0 z-[2000] bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-4">
            <div class="bg-gray-950 border border-gray-800 w-full max-w-2xl rounded-2xl p-5 sm:p-6 shadow-2xl relative max-h-[90vh] overflow-y-auto">
                
                <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-500 hover:text-white font-mono text-sm p-2 bg-gray-900 rounded-lg border border-gray-800 z-50">✕ CLOSE</button>
                
                <div id="modal-content"></div>
            </div>
        </div>
    </main>

    <footer class="border-t border-gray-900 bg-gray-950/80 py-3 text-center text-[10px] font-mono text-gray-600 flex-none">
        &copy; 2026 THE GROUND LEVEL. FOREFRONT FLIGHT GEOMETRY MATRIX.
    </footer>

    <script>
        // Departure Coordinate Base (Irvine, California)
        const originCoords = [33.6846, -117.8265];
        
        const destinations = {
            bangkok: {
                title: "Bangkok, Thailand",
                coords: [13.7563, 100.5018], distance: "8,255 miles",
                text: "The high-velocity heart of Southeast Asia. Bangkok challenges your senses with its complex maze of street food networks, ancient golden temple architecture, and chaotic modern energy.",
                photos: ["media/photos/bangkok1.jpg", "media/photos/bangkok2.jpg", "media/photos/bangkok3.jpg"],
                audio: "media/audio/bangkok-intro.mp3"
            },
            krabi: {
                title: "Krabi, Thailand",
                coords: [8.0584, 98.9169], distance: "8,242 miles",
                text: "Rugged limestone formations dropping directly into crystal coastal waters. An absolute paradise for off-the-grid adventure and deep culinary discoveries.",
                photos: ["media/photos/krabi1.jpg", "media/photos/krabi2.jpg", "media/photos/krabi3.jpg"],
                audio: "media/audio/krabi-intro.mp3"
            },
            berlin: {
                title: "Berlin, Germany",
                coords: [52.5200, 13.4050], distance: "5,793 miles",
                text: "A grand historical grid combined with unmatched creative subcultures. Berlin is raw, deep, and constantly reinventing its architecture and structural landscape.",
                photos: ["media/photos/berlin1.jpg", "media/photos/berlin2.jpg"],
                audio: "media/audio/berlin-intro.mp3"
            },
            hamburg: {
                title: "Hamburg, Germany",
                coords: [53.5511, 9.9937], distance: "5,627 miles",
                text: "A legendary maritime hub defined by architectural grit and immense water networks. We will navigate the historic, red-brick warehouse district and experience Europe's largest active ports.",
                photos: ["media/photos/hamburg1.jpg", "media/photos/hamburg2.jpg"],
                audio: "media/audio/hamburg-intro.mp3"
            },
            dortmund: {
                title: "Dortmund, Germany",
                coords: [51.5136, 7.4653], distance: "5,690 miles",
                text: "Industrial heritage masterfully repurposed into digital and cultural innovation spaces. Famous for its intense sports culture and sprawling green spaces.",
                photos: ["media/photos/dortmund1.jpg", "media/photos/dortmund2.jpg"],
                audio: "media/audio/dortmund-intro.mp3"
            },
            amsterdam: {
                title: "Amsterdam, The Netherlands",
                coords: [52.3676, 4.9041], distance: "5,655 miles",
                text: "A masterclass in historical urban planning. A completely interconnected grid of historic canal paths, artistic hubs, and exceptional biking mobility.",
                photos: ["media/photos/amsterdam1.jpg", "media/photos/amsterdam2.jpg"],
                audio: "media/audio/amsterdam-intro.mp3"
            },
            haarlem: {
                title: "Haarlem, The Netherlands",
                coords: [52.3874, 4.6462], distance: "5,645 miles",
                text: "Classic Dutch architectural history preserved in an unhurried, local pace. Exceptional cobblestone market centers just minutes away from the busy capital core.",
                photos: ["media/photos/haarlem1.jpg", "media/photos/haarlem2.jpg"],
                audio: "media/audio/haarlem-intro.mp3"
            },
            seoul: {
                title: "Seoul, South Korea",
                coords: [37.5665, 126.9780], distance: "5,974 miles",
                text: "Hyper-efficient mass transit, neon cyberpunk alleyways, and imperial palaces coexisting in perfect harmony. The absolute definition of a high-tech metropolis.",
                photos: ["media/photos/seoul1.jpg", "media/photos/seoul2.jpg", "media/photos/seoul3.jpg"],
                audio: "media/audio/seoul-intro.mp3"
            }
        };

        // Initialize Map Object
        const map = L.map('map', { center: [25, 10], zoom: 2, minZoom: 2 });
        
        // Call street/terrain tile maps from OpenStreetMap database
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // SVG Vector Graphic for the Backpacker Stickman
        const stickmanSvg = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -30 30 40" width="30" height="40" class="animated-vehicle">
                <rect x="-10" y="-22" width="6" height="12" rx="2" fill="#ef4444" />
                <circle cx="0" cy="-25" r="4" fill="#3b82f6" stroke="#ffffff" stroke-width="1"/>
                <line x1="0" y1="-21" x2="0" y2="-10" stroke="#ffffff" stroke-width="2" />
                <line x1="-5" y1="-18" x2="5" y2="-18" stroke="#ffffff" stroke-width="2" />
                <line x1="0" y1="-10" x2="-4" y2="0" stroke="#ffffff" stroke-width="2" />
                <line x1="0" y1="-10" x2="4" y2="0" stroke="#ffffff" stroke-width="2" />
            </svg>`;

        // SVG Vector Graphic for the Jet Airplane
        const airplaneSvg = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="36" height="36" fill="#10b981" class="animated-vehicle" style="transform: rotate(45deg);">
                <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L14 19v-5.5L21 16z"/>
            </svg>`;
        
        const stickmanIcon = L.divIcon({ html: stickmanSvg, className: 'custom-stickman-marker', iconSize: [30, 40], iconAnchor: [15, 10] });
        const airplaneIcon = L.divIcon({ html: airplaneSvg, className: 'custom-airplane-marker', iconSize: [36, 36], iconAnchor: [18, 18] });

        // Place constant home base station marker at Irvine
        L.marker(originCoords, {
            icon: L.divIcon({ html: '<div class="w-3 h-3 bg-blue-500 rounded-full border-2 border-white animate-pulse"></div>', className: '' })
        }).addTo(map);

        // Main Traveler Actor Marker (Starts as stickman at home base)
        const travelerMarker = L.marker(originCoords, { icon: stickmanIcon, zIndexOffset: 1000 }).addTo(map);
        
        let currentFlightLine = null;
        let slideInterval = null;

        // Loop to embed interactive node markers directly onto map canvas coordinates
        Object.keys(destinations).forEach(key => {
            const dest = destinations[key];
            const marker = L.marker(dest.coords, {
                icon: L.divIcon({ html: '<div class="w-4 h-4 bg-emerald-500 rounded-full border-2 border-gray-950 hover:scale-125 transition-transform cursor-pointer shadow-lg shadow-emerald-500/50"></div>', className: '' })
            }).addTo(map);
            
            marker.on('click', () => triggerExpedition(key));
        });

        // Launch screen close sequence handler
        function launchWebsite() {
            const overlay = document.getElementById('intro-overlay');
            const introAudio = document.getElementById('intro-audio');
            overlay.classList.add('opacity-0');
            setTimeout(() => overlay.remove(), 1000);

            if (introAudio) {
                introAudio.play().catch(err => console.log("Autoplay check handled successfully.", err));
            }
        }
