<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ground Level | Travel Curation</title>
    <!-- Tailwind CSS for clean, rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom dark-mode scrollbar and subtle cyber-noir aesthetics */
        body { background-color: #0b0f19; color: #f3f4f6; font-family: system-ui, -apple-system, sans-serif; }
        .accent-glow { text-shadow: 0 0 12px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <!-- Header / Navigation -->
    <header class="border-b border-gray-800 bg-gray-950/80 backdrop-blur sticky top-0 z-50 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-mono tracking-widest text-blue-500 font-bold accent-glow">THE GROUND LEVEL</h1>
            <div id="intro-player-container" class="flex items-center space-x-3 bg-gray-900 px-4 py-2 rounded-lg border border-gray-800">
                <span class="text-xs font-mono text-gray-400">GUIDE BRIEFING:</span>
                <!-- Audio Element for Intro -->
                <audio id="intro-audio" src="media/audio/intro.mp3" controls class="h-8 max-w-[200px] sm:max-w-xs invert opacity-80"></audio>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-6 py-12 flex-grow w-full">
        
        <!-- Hero Concept Section -->
        <section class="text-center max-w-3xl mx-auto mb-16">
            <h2 class="text-4xl sm:text-5xl font-black tracking-tight mb-4 text-white">Don't Just Visit. <span class="text-blue-500">Arrive.</span></h2>
            <p class="text-gray-400 text-lg">Skip the tourist traps. Explore the world through the eyes of a guide who knows the terrain, the precise logistics, and the authentic local flavors.</p>
        </section>

        <!-- Destination Console Interface -->
        <section class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Sidebar Navigation Menu -->
            <div class="lg:col-span-4 space-y-2">
                <h3 class="text-xs font-mono text-gray-500 uppercase tracking-wider pl-2 mb-3">Select Target Hub</h3>
                <button onclick="switchDest('seoul')" class="dest-btn w-full text-left px-4 py-3 rounded-xl border border-blue-500/30 bg-blue-950/20 text-blue-400 font-semibold transition-all">Seoul, South Korea</button>
                <button onclick="switchDest('krabi')" class="dest-btn w-full text-left px-4 py-3 rounded-xl border border-gray-800 bg-gray-900/40 text-gray-400 hover:bg-gray-900 hover:text-gray-200 transition-all">Krabi, Thailand</button>
                <button onclick="switchDest('germany')" class="dest-btn w-full text-left px-4 py-3 rounded-xl border border-gray-800 bg-gray-900/40 text-gray-400 hover:bg-gray-900 hover:text-gray-200 transition-all">Dusseldorf & Hamburg</button>
                <button onclick="switchDest('netherlands')" class="dest-btn w-full text-left px-4 py-3 rounded-xl border border-gray-800 bg-gray-900/40 text-gray-400 hover:bg-gray-900 hover:text-gray-200 transition-all">Amsterdam & Haarlem</button>
                <button onclick="switchDest('london')" class="dest-btn w-full text-left px-4 py-3 rounded-xl border border-gray-800 bg-gray-900/40 text-gray-400 hover:bg-gray-900 hover:text-gray-200 transition-all">London, England</button>
            </div>

            <!-- Dynamic Display Dynamic Display Window -->
            <div id="display-panel" class="lg:col-span-8 bg-gray-950 border border-gray-800 rounded-2xl p-6 sm:p-8 shadow-2xl relative overflow-hidden">
                <!-- Data injected dynamically by JavaScript below -->
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-900 bg-gray-950/50 py-6 text-center text-xs font-mono text-gray-600">
        &copy; 2026 THE GROUND LEVEL. DESIGNED FOR EXPEDITION.
    </footer>

    <!-- Frontend Logic & Destination Database Matrix -->
    <script>
        const destinations = {
            seoul: {
                title: "Seoul, South Korea",
                persona: "Hyper-Modern Urban Tech meets Timeless Tradition",
                text: "Seoul is a masterclass in contrast—a city operating in the future while fiercely guarding its past. Walk down one alley and you’re surrounded by cyberpunk neon, flawless digital infrastructure, and cutting-edge tech; turn a corner, and you’re standing before the quiet majesty of a centuries-old palace. I’ll show you how to effortlessly command this massive metropolis, seamlessly transitioning from hyper-efficient transit networks to hidden, late-night street food stalls.",
                mediaType: "video",
                mediaSrc: "media/video/seoul.mp4",
                poster: "media/photos/seoul-poster.jpg",
                audioSrc: "media/audio/seoul-ambience.mp3",
                vibe: "High-Octane Urbanism / Tech-Forward"
            },
            krabi: {
                title: "Krabi, Thailand",
                persona: "Rugged Adventure meets Deep Coastal Immersion",
                text: "Forget the sanitized resort packages. Krabi is a high-intensity paradise where massive limestone cliffs plunge directly into the Andaman Sea, demanding exploration. As your guide, I bypass the typical tourist bottlenecks to get you on the ground where the real magic happens—whether that's navigating the logistics of a traditional longtail boat to hidden lagoons, taking on rugged coastal terrain, or tracking down the absolute best, fire-spiced Pad Krapow at a night market only the locals know about.",
                mediaType: "image",
                mediaSrc: "media/photos/krabi.jpg",
                audioSrc: "media/audio/krabi-waves.mp3",
                vibe: "High-Intensity Adventure & Coastal Escape"
            },
            germany: {
                title: "Dusseldorf & Hamburg, Germany",
                persona: "Architectural Mastery, Maritime Grit, & Unexpected Culinary Gems",
                text: "Experience the ultimate balance of German engineering and vibrant subcultures. In Hamburg, we'll navigate the historic, red-brick Speicherstadt warehouses and feel the pulse of the massive harbor layout. In Dusseldorf, we pivot to striking modern design along the Rhine and dive headfirst into the legendary, authentic Japanese culinary landscape of 'Little Tokyo' for world-class ramen.",
                mediaType: "image",
                mediaSrc: "media/photos/germany.jpg",
                audioSrc: "",
                vibe: "Architecture, Maritime, & Culinary Cult"
            },
            netherlands: {
                title: "Amsterdam & Haarlem, The Netherlands",
                persona: "Interconnected Waterways & Deep Neighborhood Retreats",
                text: "A perfect dual-pace experience. Master the iconic, bustling rings of canals and historic museums in Amsterdam, then take a seamless 15-minute escape to Haarlem. There, we step back into a quieter, incredibly preserved historic aesthetic with stunning architecture and a truly local, unhurried pace.",
                mediaType: "image",
                mediaSrc: "media/photos/netherlands.jpg",
                audioSrc: "",
                vibe: "Historic Channels & Hidden Local Towns"
            },
            london: {
                title: "London, England",
                persona: "The Global Epicenter & Endless Historical Scale",
                text: "London is a sprawling compilation of distinct neighborhoods, each carrying its own historic weight and modern cultural identity. I focus on flawless urban tactical execution here: navigating transit lines smoothly, skipping the tourist bottlenecks, and finding those classic, tucked-away gastropubs and cultural markets that hold the true soul of the city.",
                mediaType: "image",
                mediaSrc: "media/photos/london.jpg",
                audioSrc: "",
                vibe: "Grand Scale Metros & Neighborhood Grid Mastery"
            }
        };

        function switchDest(key) {
            // Update button styles to reflect active choice
            const buttons = document.querySelectorAll('.dest-btn');
            buttons.forEach(btn => {
                if(btn.getAttribute('onclick').includes(key)) {
                    btn.className = "dest-btn w-full text-left px-4 py-3 rounded-xl border border-blue-500/30 bg-blue-950/20 text-blue-400 font-semibold transition-all";
                } else {
                    btn.className = "dest-btn w-full text-left px-4 py-3 rounded-xl border border-gray-800 bg-gray-900/40 text-gray-400 hover:bg-gray-900 hover:text-gray-200 transition-all";
                }
            });

            const data = destinations[key];
            const panel = document.getElementById('display-panel');

            // Set up media element conditional (Video or Image Showcase)
            let mediaHtml = '';
            if(data.mediaType === 'video') {
                mediaHtml = `<video src="${data.mediaSrc}" poster="${data.poster}" autoplay loop muted playsinline class="w-full h-64 object-cover rounded-xl border border-gray-800 mb-6 shadow-md"></video>`;
            } else {
                mediaHtml = `<img src="${data.mediaSrc}" alt="${data.title}" class="w-full h-64 object-cover rounded-xl border border-gray-800 mb-6 shadow-md">`;
            }

            // Set up optional background ambient track
            let audioHtml = '';
            if(data.audioSrc) {
                audioHtml = `
                    <div class="mt-6 p-3 bg-gray-900 rounded-xl border border-gray-800 flex items-center justify-between">
                        <span class="text-xs font-mono text-gray-400 flex items-center">🎵 Ambient Track Available:</span>
                        <audio src="${data.audioSrc}" controls class="h-6 max-w-[180px] sm:max-w-xs invert opacity-60"></audio>
                    </div>`;
            }

            // Inject the elements with sharp formatting layouts
            panel.innerHTML = `
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-gray-900 pb-4 mb-4 gap-2">
                    <div>
                        <h3 class="text-2xl font-bold text-white tracking-tight">${data.title}</h3>
                        <p class="text-xs font-mono text-blue-400 uppercase mt-0.5">${data.persona}</p>
                    </div>
                    <span class="text-xs font-mono bg-gray-900 text-gray-400 border border-gray-800 px-3 py-1 rounded-full whitespace-nowrap">${data.vibe}</span>
                </div>
                ${mediaHtml}
                <p class="text-gray-300 leading-relaxed text-sm sm:text-base">${data.text}</p>
                ${audioHtml}
            `;
        }

        // Initialize display panel with first destination on load
        document.addEventListener("DOMContentLoaded", () => {
            switchDest('seoul');
        });
    </script>
</body>
</html>
